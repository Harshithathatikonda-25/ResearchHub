<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library - ResearchHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="app.js?v=2"></script>
</head>

<body>
    <script> checkAuth(); </script>

    <div class="sidebar">
        <div class="brand-area">
            <div class="brand-icon">
                <i class="fas fa-book-open"></i>
            </div>
            <div class="brand-info">
                <div class="brand-title">ResearchHub</div>
                <div class="brand-tagline">Research Manager</div>
            </div>
        </div>

        <nav class="nav-menu">
            <div class="nav-section">
                <div class="nav-section-title">Main</div>
                <a href="index.html" class="nav-link">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="papers.html" class="nav-link active">
                    <i class="fas fa-book-bookmark"></i>
                    <span>Library</span>
                </a>
                <a href="upload.html" class="nav-link">
                    <i class="fas fa-cloud-arrow-up"></i>
                    <span>Upload</span>
                </a>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Tools</div>
                <a href="#" class="nav-link" onclick="showComingSoon(); return false;">
                    <i class="fas fa-sticky-note"></i>
                    <span>Notes</span>
                </a>
                <a href="#" class="nav-link" onclick="showComingSoon(); return false;">
                    <i class="fas fa-highlighter"></i>
                    <span>Highlights</span>
                </a>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Account</div>
                <a href="#" class="nav-link" onclick="showComingSoon(); return false;">
                    <i class="fas fa-gear"></i>
                    <span>Settings</span>
                </a>
            </div>
        </nav>

        <div class="logout-area">
            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt" style="margin-right: 0.4rem;"></i> Logout
            </button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-header">
            <div class="header-left">
                <h1 class="header-title">Library</h1>
                <div class="header-search">
                    <input type="text" placeholder="Search papers..." id="headerSearch">
                </div>
            </div>
            <div class="header-right">
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">
                  <i class="fas fa-moon"></i>
                </button>
                <div class="header-info">
                    <div class="welcome-text">Welcome back</div>
                    <div class="user-name" id="headerUserName">User</div>
                </div>
                <div class="user-avatar" id="headerAvatar">U</div>
            </div>
        </div>

        <div class="container">
            <div style="margin-bottom: 1.5rem;">
                <h1 style="font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--text-primary);">Your Research Library</h1>
                <p style="color: var(--text-secondary);">Search, sort, and manage your personalized collection.</p>
            </div>

            <div style="background: var(--card-bg); backdrop-filter: blur(5px); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--bg-tertiary); margin-bottom: 2rem;">
                <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end;">
                    <div style="flex: 1; min-width: 250px;">
                        <label style="color: var(--text-secondary); font-size: 0.8rem; display: block; margin-bottom: 0.5rem; font-weight: 600;">Search</label>
                        <input type="text" id="searchInput" class="form-control" placeholder="Search title or author...">
                    </div>
                    <div style="flex: 1; min-width: 200px;">
                        <label style="color: var(--text-secondary); font-size: 0.8rem; display: block; margin-bottom: 0.5rem; font-weight: 600;">Domain</label>
                        <select id="domainSelect" class="form-control" style="appearance: none;">
                            <option value="">All Domains</option>
                            <option value="AI / Deep Learning">AI / Deep Learning</option>
                            <option value="Software Engineering">Software Engineering</option>
                            <option value="Mathematics">Mathematics</option>
                            <option value="Physics">Physics</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div style="flex: 1; min-width: 200px;">
                        <label style="color: var(--text-secondary); font-size: 0.8rem; display: block; margin-bottom: 0.5rem; font-weight: 600;">Difficulty</label>
                        <select id="diffSelect" class="form-control" style="appearance: none;">
                            <option value="">All Difficulties</option>
                            <option value="Beginner">Beginner</option>
                            <option value="Intermediate">Intermediate</option>
                            <option value="Advanced">Advanced</option>
                        </select>
                    </div>
                    <div style="flex: 1; min-width: 200px;">
                        <label style="color: var(--text-secondary); font-size: 0.8rem; display: block; margin-bottom: 0.5rem; font-weight: 600;">Sort By</label>
                        <select id="sortSelect" class="form-control" style="appearance: none;">
                            <option value="latest">Latest Addition</option>
                            <option value="oldest">Oldest Addition</option>
                            <option value="completed">Completed First</option>
                            <option value="status">Status (Active → New → Done)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card-grid" id="papersContainer">
                <!-- Cards rendered via JS -->
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        function normalizeStatus(status) {
            const value = String(status || '').trim().toLowerCase();
            if (value === 'not started' || value === 'not_started' || value === 'notstarted') return 'Not Started';
            if (value === 'in progress' || value === 'in_progress' || value === 'inprogress') return 'In Progress';
            if (value === 'completed') return 'Completed';
            return status;
        }

        function getStatusKey(status) {
            return String(normalizeStatus(status) || '').trim().toLowerCase().replace(/\s+/g, '_');
        }

        (async function() {
            const user = getCurrentUser();
            document.getElementById('headerUserName').textContent = user;
            document.getElementById('headerAvatar').textContent = user.charAt(0).toUpperCase();

            await loadPapersFromBackend();
            renderPapers();

            document.getElementById('searchInput').addEventListener('input', renderPapers);
            document.getElementById('domainSelect').addEventListener('change', renderPapers);
            document.getElementById('diffSelect').addEventListener('change', renderPapers);
            document.getElementById('sortSelect').addEventListener('change', renderPapers);
        })();

        function renderPapers() {
            const allPapers = getPapers();
            const search = document.getElementById('searchInput').value.toLowerCase();
            const domain = document.getElementById('domainSelect').value;
            const difficulty = document.getElementById('diffSelect').value;
            const sort = document.getElementById('sortSelect').value;

            let filtered = allPapers.filter(p => {
                const matchSearch = p.title.toLowerCase().includes(search) || p.author.toLowerCase().includes(search);
                const matchDomain = !domain || p.domain === domain;
                const matchDiff = !difficulty || p.difficulty === difficulty;
                return matchSearch && matchDomain && matchDiff;
            });

            if (sort === 'completed') {
                filtered.sort((a, b) => (getStatusKey(a.status) === 'completed' ? -1 : 1));
            } else if (sort === 'oldest') {
                filtered.reverse();
            } else if (sort === 'status') {
                const statusOrder = { 'in_progress': 0, 'not_started': 1, 'completed': 2 };
                filtered.sort((a, b) => (statusOrder[getStatusKey(a.status)] || 2) - (statusOrder[getStatusKey(b.status)] || 2));
            }

            const container = document.getElementById('papersContainer');
            container.innerHTML = '';

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><div class="empty-icon"><i class="fas fa-search"></i></div><div class="empty-title">No papers found</div><div class="empty-text">Try adjusting your filters or upload a new paper.</div></div>';
                return;
            }

            filtered.forEach(paper => {
                const progressPercent = formatProgress(paper.progress);
                const statusKey = getStatusKey(paper.status);

                // Status badge
                const statusBadgeClass = statusKey === 'completed' ? 'status-completed' : statusKey === 'in_progress' ? 'status-progress' : 'status-not-started';
                const statusLabel = statusKey === 'completed' ? 'Completed' : statusKey === 'in_progress' ? 'In Progress' : 'Not Started';
                const statusIcon = statusKey === 'completed' ? 'fa-check-circle' : statusKey === 'in_progress' ? 'fa-book-open' : 'fa-bookmark';

                // Action button based on status
                let actionBtn = '';
                if (statusKey === 'not_started') {
                    actionBtn = `<button class="action-btn action-btn-primary" onclick="quickStart(${paper.id})"><i class="fas fa-play"></i> Start</button>`;
                } else if (statusKey === 'in_progress') {
                    actionBtn = `<button class="action-btn action-btn-primary" onclick="window.location.href='paperdetails.html?id=${paper.id}'"><i class="fas fa-book-open"></i> Resume</button>`;
                } else {
                    actionBtn = `<button class="action-btn" style="color:var(--success);border-color:var(--success);" onclick="window.location.href='paperdetails.html?id=${paper.id}'"><i class="fas fa-check-circle"></i> Review</button>`;
                }

                const card = document.createElement('div');
                card.className = 'paper-card';
                card.style.cursor = 'pointer';
                card.innerHTML = `
                    <div style="display:flex; align-items:center; gap:0.75rem; margin-bottom:0.75rem;">
                        <div class="paper-icon">
                            <i class="fas ${statusIcon}"></i>
                        </div>
                        <span class="status-badge ${statusBadgeClass}" style="margin-left:auto;">${statusLabel}</span>
                    </div>
                    <div class="paper-title" onclick="window.location.href='paperdetails.html?id=${paper.id}'">${paper.title}</div>
                    <div class="paper-author">${paper.author} · ${paper.year || ''}</div>
                    <div class="paper-meta" style="margin-top:0.5rem;">
                        <span class="paper-tag"><i class="fas fa-folder"></i> ${paper.domain || 'General'}</span>
                        <span class="paper-tag"><i class="fas fa-signal"></i> ${paper.difficulty || 'N/A'}</span>
                        ${paper.timeToRead ? `<span class="paper-tag"><i class="fas fa-clock"></i> ${paper.timeToRead}</span>` : ''}
                    </div>
                    <div class="paper-progress">
                        <div class="progress-label">
                            <span>Progress</span>
                            <span>${progressPercent}%</span>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar" style="width:${progressPercent}%"></div>
                        </div>
                    </div>
                    <div class="paper-actions">
                        ${actionBtn}
                        <button class="action-btn" style="color:var(--danger); margin-left:auto;" onclick="deletePaper(${paper.id})" title="Delete">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function updateStatus(paperId, status) {
            const papers = getPapers();
            const paper = papers.find(p => p.id === paperId);
            const progress = paper ? formatProgress(paper.progress) : 0;
            await updatePaperStatus(paperId, status, status === 'Completed' ? 100 : status === 'Not Started' ? 0 : progress);
            showToast(`Status updated to ${status}`, false);
            renderPapers();
        }

        async function quickStart(paperId) {
            const papers = getPapers();
            const paper = papers.find(p => p.id === paperId);
            if (!paper) return;
            try {
                await fetch('api.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'update', id: paperId, status: 'In Progress', progress: 0, isFavorite: paper.isFavorite ? 1 : 0 })
                });
            } catch(e) {}
            window.location.href = 'paperdetails.html?id=' + paperId;
        }

        async function deletePaper(paperId) {
            if (!confirm('Delete this paper? This cannot be undone.')) return;
            const user = getCurrentUser();
            try {
                const res = await fetch('api.php', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ id: paperId, user })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    showToast('Paper deleted.', false);
                    await loadPapersFromBackend();
                    renderPapers();
                } else {
                    showToast('Delete failed: ' + result.message, true);
                }
            } catch (e) {
                showToast('Error deleting paper.', true);
            }
        }

        function showComingSoon() {
            showToast('This feature is coming soon!', false);
        }
    </script>
</body>

</html>
