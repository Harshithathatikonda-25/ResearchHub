<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Details - ResearchHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="app.js?v=2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf_viewer.min.css">
    <style>
        .meta-tag {
            background: var(--accent-primary-light);
            padding: 0.4rem 0.85rem;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-block;
            margin-right: 0.6rem;
            margin-bottom: 0.8rem;
            color: var(--accent-primary-dark);
            font-weight: 500;
        }

        .range-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: var(--bg-secondary);
            outline: none;
        }

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            cursor: pointer;
            box-shadow: var(--shadow-md);
        }

        .range-slider::-moz-range-thumb {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            cursor: pointer;
            border: none;
            box-shadow: var(--shadow-md);
        }
        
        .bullets-list {
            padding-left: 1.5rem;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .pdf-page-container {
            position: relative;
            margin-bottom: 1rem;
            box-shadow: var(--shadow-lg);
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .pdf-page-container canvas {
            display: block;
        }
        
        .textLayer {
            position: absolute;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            opacity: 0.2;
            line-height: 1.0;
        }

        .textLayer ::selection {
            background: var(--accent-primary);
            color: transparent;
        }

        .breadcrumb-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 1.5rem;
            transition: var(--transition);
        }

        .breadcrumb-back:hover {
            color: var(--accent-primary-dark);
            transform: translateX(-4px);
        }
    </style>
</head>

<body>
    <script>checkAuth();</script>

    <div class="sidebar">
        <div class="brand-area">
            <div class="brand-icon">
                <i class="fas fa-book-open"></i>
            </div>
            <div class="brand-info">
                <div class="brand-title">ResearchHub</div>
                <div class="brand-tagline">Research Manager</div>
            </div>
        </div>

        <nav class="nav-menu">
            <div class="nav-section">
                <div class="nav-section-title">Main</div>
                <a href="index.html" class="nav-link">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="papers.html" class="nav-link active">
                    <i class="fas fa-book-bookmark"></i>
                    <span>Library</span>
                </a>
                <a href="upload.html" class="nav-link">
                    <i class="fas fa-cloud-arrow-up"></i>
                    <span>Upload</span>
                </a>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Tools</div>
                <a href="#" class="nav-link" onclick="showComingSoon(); return false;">
                    <i class="fas fa-sticky-note"></i>
                    <span>Notes</span>
                </a>
                <a href="#" class="nav-link" onclick="showComingSoon(); return false;">
                    <i class="fas fa-highlighter"></i>
                    <span>Highlights</span>
                </a>
            </div>
        </nav>

        <div class="logout-area">
            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt" style="margin-right: 0.4rem;"></i> Logout
            </button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-header">
            <div class="header-left">
                <h1 class="header-title">Paper Details</h1>
                <div class="header-search">
                    <input type="text" placeholder="Search papers..." id="headerSearch">
                </div>
            </div>
            <div class="header-right">
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">
                  <i class="fas fa-moon"></i>
                </button>
                <div class="header-info">
                    <div class="welcome-text">Welcome back</div>
                    <div class="user-name" id="headerUserName">User</div>
                </div>
                <div class="user-avatar" id="headerAvatar">U</div>
            </div>
        </div>

        <div class="container" style="max-width: 900px; margin: 2rem auto;">
            <a href="papers.html" class="breadcrumb-back">
                <i class="fas fa-arrow-left"></i> Back to Library
            </a>

            <div class="glass-container" id="detailsBox" style="border: 1px solid var(--bg-tertiary); border-radius: 12px;">
                <!-- Dynamic render -->
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        function normalizeStatus(status) {
            const value = String(status || '').trim().toLowerCase();
            if (value === 'not started' || value === 'not_started' || value === 'notstarted') return 'Not Started';
            if (value === 'in progress' || value === 'in_progress' || value === 'inprogress') return 'In Progress';
            if (value === 'completed') return 'Completed';
            return status;
        }

        function getStatusKey(status) {
            return String(normalizeStatus(status) || '').trim().toLowerCase().replace(/\s+/g, '_');
        }

        (async function() {
            checkAuth();
            const user = getDisplayUser();
            document.getElementById('headerUserName').textContent = user;
            document.getElementById('headerAvatar').textContent = user.charAt(0).toUpperCase();

            await loadPapersFromBackend();

            const urlParams = new URLSearchParams(window.location.search);
            let paperId = parseInt(urlParams.get('id'));

            function loadPaper() {
                const papers = getPapers();
                const paper = papers.find(p => p.id === paperId);
                const box = document.getElementById("detailsBox");

                if (!paper) {
                    box.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon"><i class="fas fa-file-times"></i></div>
                            <div class="empty-title">Paper Not Found</div>
                            <div class="empty-text">This paper doesn't exist or may have been deleted.</div>
                            <button class="btn" onclick="window.location.href='papers.html'" style="margin-top: 1rem;">
                                <i class="fas fa-arrow-left"></i> Go to Library
                            </button>
                        </div>
                    `;
                    return;
                }

                addRecentItem(paper);

                const statusKey = getStatusKey(paper.status);
                const statusBadgeClass = statusKey === 'completed' ? 'status-completed' : 
                                        (statusKey === 'in_progress' ? 'status-progress' : 'status-not-started');
                const statusText = statusKey === 'completed' ? 'Completed' : 
                                  (statusKey === 'in_progress' ? 'In Progress' : 'Not Started');

                let progressWidget = "";
                const paperProgress = formatProgress(paper.progress);
                if (statusKey === 'in_progress') {
                    const isHundred = paperProgress >= 100;
                    progressWidget = `
                    <div style="background: var(--accent-primary-light); padding: 2rem; border-radius: 12px; margin-top: 2rem;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                            <h4 style="color: var(--text-primary); margin: 0; display: flex; align-items: center; gap: 0.6rem;">
                                <i class="fas fa-book-reader"></i> Reading Progress
                            </h4>
                            <span style="color: var(--accent-primary-dark); font-weight: bold; font-size: 1.3rem;" id="progDisplay">${paperProgress}%</span>
                        </div>
                        <input type="range" class="range-slider" id="progressSlider" min="0" max="100" value="${paperProgress}"
                            style="background: linear-gradient(to right, var(--accent-primary) ${paperProgress}%, var(--bg-secondary) ${paperProgress}%)"
                            oninput="onSliderInput(this.value)"
                            onchange="onSliderChange(this.value)">
                        <div style="margin-top: 1.5rem; display: flex; gap: 1rem; flex-wrap: wrap;">
                            <button class="btn btn-success" style="flex: 1;" onclick="updateStatus('Completed')">
                                <i class="fas fa-check-circle"></i> Mark as Completed
                            </button>
                        </div>
                        <div id="saveToDesktopBtn" style="margin-top: 1rem; display: ${isHundred ? 'block' : 'none'};">
                            <button class="btn btn-primary btn-full" onclick="savePaperToDesktop()">
                                <i class="fas fa-download"></i> Save Completed Paper to Desktop
                            </button>
                        </div>
                    </div>`;
                } else if (statusKey === 'not_started') {
                    progressWidget = `
                    <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                        <button class="btn" style="flex: 1;" onclick="updateStatus('In Progress')">
                            <i class="fas fa-play-circle"></i> Start Reading
                        </button>
                        <button class="btn btn-secondary" onclick="updateStatus('Completed')">
                            <i class="fas fa-fast-forward"></i> Mark Completed
                        </button>
                    </div>`;
                } else if (statusKey === 'completed') {
                    progressWidget = `
                    <div style="background: var(--pastel-mint); padding: 2rem; border-radius: 12px; margin-top: 2rem; text-align: center;">
                        <h4 style="color: var(--success); margin: 0 0 0.5rem 0; font-size: 1.2rem;">
                            <i class="fas fa-check-circle"></i> Paper Completed — 100%
                        </h4>
                        <p style="color: var(--text-secondary); margin: 0 0 1.2rem;">You've finished reading this paper!</p>
                        <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                            <button class="btn btn-primary" onclick="savePaperToDesktop()">
                                <i class="fas fa-download"></i> Save to Desktop
                            </button>
                            <button class="btn btn-secondary" onclick="updateStatus('In Progress')">
                                <i class="fas fa-redo"></i> Mark as In Progress
                            </button>
                        </div>
                    </div>`;
                }

                let summaryHtml = "";
                let pdfActionHtml = "";
                if (paper.pdfPath) {
                    const pdfUrl = new URL(paper.pdfPath, window.location.href).href;
                    pdfActionHtml = `
                    <div style="margin-top: 1.5rem; display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap;">
                        <button class="btn btn-primary" onclick="window.open('${pdfUrl}', '_blank')">
                            <i class="fas fa-file-pdf"></i> View Full Research Paper
                        </button>
                        <button class="btn btn-secondary" onclick="window.location.href='${pdfUrl}'">
                            <i class="fas fa-download"></i> Open PDF Directly
                        </button>
                    </div>`;
                }
                if (statusKey === "completed") {
                    let bulletsHtml = "";
                    if (paper.keyPoints) {
                        const keyPointsList = typeof paper.keyPoints === 'string' ? 
                            paper.keyPoints.split('\n').filter(kp => kp.trim()) : 
                            paper.keyPoints;
                        if (keyPointsList.length > 0) {
                            bulletsHtml = `
                            <div style="margin-top: 1.5rem;">
                                <h4 style="color: var(--accent-primary); margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.6rem;">
                                    <i class="fas fa-lightbulb"></i> Key Points
                                </h4>
                                <ul class="bullets-list">
                                    ${keyPointsList.map(kp => `<li style="margin-bottom: 0.5rem; color: var(--text-secondary);">${kp.replace(/^-\s*/, '')}</li>`).join('')}
                                </ul>
                            </div>`;
                        }
                    }

                    // Show PDF viewer when completed
                    let pdfViewerHtml = "";
                    if (paper.pdfPath) {
                        const pdfUrl = new URL(paper.pdfPath, window.location.href).href;
                        pdfViewerHtml = `
                        <div style="margin-top: 2rem;">
                            <h4 style="color: var(--accent-primary); margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.6rem;">
                                <i class="fas fa-file-pdf"></i> Research Paper PDF
                            </h4>
                            <iframe src="${pdfUrl}" style="width:100%; height:600px; border:none; border-radius:8px; box-shadow: var(--shadow-lg);" title="Research Paper PDF"></iframe>
                            <div style="margin-top: 0.8rem; display: flex; gap: 1rem; flex-wrap: wrap;">
                                <button class="btn btn-primary" onclick="window.open('${pdfUrl}', '_blank')">
                                    <i class="fas fa-external-link-alt"></i> Open in New Tab
                                </button>
                            </div>
                        </div>`;
                    }

                    summaryHtml = `
                    <div style="background: var(--accent-secondary-light); padding: 1.5rem; border-radius: 12px; margin-top: 2rem; border-left: 4px solid var(--accent-secondary);">
                        <h4 style="color: var(--accent-secondary); margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.6rem;">
                            <i class="fas fa-bookmark"></i> Detailed Summary
                        </h4>
                        <p style="color: var(--text-secondary); line-height: 1.6; margin: 0;">${paper.detailedSummary || paper.fullSummary || 'No detailed summary provided.'}</p>
                        ${bulletsHtml}
                    </div>
                    ${pdfViewerHtml}`;
                } else {
                    // Show PDF viewer even when locked (reading the paper is how you make progress)
                    let lockedPdfHtml = "";
                    if (paper.pdfPath) {
                        const pdfUrl = new URL(paper.pdfPath, window.location.href).href;
                        lockedPdfHtml = `
                        <div style="margin-top: 1.5rem;">
                            <h4 style="color: var(--text-primary); margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.6rem;">
                                <i class="fas fa-file-pdf"></i> Research Paper PDF
                            </h4>
                            <iframe src="${pdfUrl}" style="width:100%; height:600px; border:none; border-radius:8px; box-shadow: var(--shadow-lg);" title="Research Paper PDF"></iframe>
                            <div style="margin-top: 0.8rem; display: flex; gap: 1rem; flex-wrap: wrap;">
                                <button class="btn btn-primary" onclick="window.open('${pdfUrl}', '_blank')">
                                    <i class="fas fa-external-link-alt"></i> Open in New Tab
                                </button>
                            </div>
                        </div>`;
                    }
                    summaryHtml = `
                    <div style="background: var(--pastel-rose); padding: 1.5rem; border-radius: 12px; margin-top: 2rem; border: 1px solid rgba(239, 68, 68, 0.3); text-align: center;">
                        <h4 style="color: var(--danger); margin: 0 0 0.5rem 0; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                            <i class="fas fa-lock"></i> Detailed Content Locked
                        </h4>
                        <p style="color: var(--text-secondary); margin: 0;">Complete this paper to view the detailed summary and key points.</p>
                    </div>
                    ${lockedPdfHtml}`;
                }

                const diffClass = paper.difficulty === 'Intermediate' ? 'diff-intermediate' : 
                                 (paper.difficulty === 'Advanced' ? 'diff-advanced' : 'diff-beginner');

                box.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem;">
                        <div style="flex: 1;">
                            <h1 style="font-size: 1.75rem; margin: 0 0 0.5rem 0; color: var(--text-primary); line-height: 1.3;">
                                ${paper.title}
                            </h1>
                            <p style="color: var(--text-secondary); margin: 0; font-size: 1rem;">
                                <i class="fas fa-user"></i> ${paper.author}
                                <span style="color: var(--text-tertiary); margin: 0 0.5rem;;">•</span>
                                <i class="fas fa-calendar"></i> ${paper.year}
                            </p>
                        </div>
                        <button class="rec-icon-btn ${paper.isFavorite ? 'active' : ''}" onclick="toggleFavorite()" style="font-size: 1.1rem; width: 44px; height: 44px; padding: 0;">
                            <i class="${paper.isFavorite ? 'fas' : 'far'} fa-heart"></i>
                        </button>
                    </div>

                    <div style="display: flex; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 2rem;">
                        <span class="badge badge-primary">${paper.domain || 'General'}</span>
                        <span class="badge ${diffClass}">${paper.difficulty || 'Intermediate'}</span>
                        ${paper.timeToRead ? `<span class="badge badge-info"><i class="fas fa-hourglass-half"></i> ${paper.timeToRead}</span>` : ''}
                        <span class="status-badge ${statusBadgeClass}">
                            <i class="fas ${statusBadgeClass === 'status-completed' ? 'fa-check-circle' : (statusBadgeClass === 'status-progress' ? 'fa-book-open' : 'fa-bookmark')}"></i>
                            ${statusText}
                        </span>
                    </div>

                    <div style="background: var(--bg-secondary); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem;">
                        <h4 style="color: var(--text-primary); margin: 0 0 0.8rem 0; display: flex; align-items: center; gap: 0.5rem;">
                            <i class="fas fa-align-left"></i> Overview
                        </h4>
                        <p style="color: var(--text-secondary); margin: 0; line-height: 1.6;">
                            ${paper.shortSummary || 'No overview available.'}
                        </p>
                    </div>

                    ${progressWidget}
                    ${summaryHtml}
                `;
            }

            loadPaper();

            async function updateStatus(newStatus) {
                const papers = getPapers();
                const paper = papers.find(p => p.id === paperId);
                if (!paper) return;
                const progressValue = newStatus === 'Completed' ? 100 : (newStatus === 'Not Started' ? 0 : formatProgress(paper.progress));
                await updatePaperStatus(paperId, newStatus, progressValue, paper.isFavorite);
                showToast(`Status updated to ${newStatus}`, false);
                await loadPapersFromBackend();
                loadPaper();
            }

            // Live label update while dragging — NO re-render
            function onSliderInput(val) {
                const v = parseInt(val);
                const display = document.getElementById('progDisplay');
                if (display) display.innerText = v + '%';
                const saveBtn = document.getElementById('saveToDesktopBtn');
                if (saveBtn) saveBtn.style.display = v >= 100 ? 'block' : 'none';
                // Update slider fill color
                const slider = document.getElementById('progressSlider');
                if (slider) slider.style.background = `linear-gradient(to right, var(--accent-primary) ${v}%, var(--bg-secondary) ${v}%)`;
            }

            // Save to DB on mouse/touch release
            async function onSliderChange(val) {
                const value = parseInt(val);
                const papers = getPapers();
                const paper = papers.find(p => p.id === paperId);
                if (!paper) return;

                const newStatus = value >= 100 ? 'Completed' : 'In Progress';

                // Call API directly — skip the internal loadPapersFromBackend inside updatePaperStatus
                try {
                    await fetch(getApiUrl(), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'update',
                            id: paperId,
                            status: newStatus,
                            progress: value >= 100 ? 100 : value,
                            isFavorite: paper.isFavorite ? 1 : 0
                        })
                    });
                } catch(e) { console.error(e); }

                if (value >= 100) {
                    showToast('Reading complete! Paper marked as Completed.', false);
                    // Re-render only when fully done
                    await loadPapersFromBackend();
                    loadPaper();
                } else {
                    showToast('Progress saved: ' + value + '%', false);
                    // Update local cache without re-render so slider stays
                    if (window.appState.papers) {
                        const cached = window.appState.papers.find(p => p.id === paperId);
                        if (cached) { cached.progress = value; cached.status = 'In Progress'; }
                    }
                }
            }

            function savePaperToDesktop() {
                const papers = getPapers();
                const paper = papers.find(p => p.id === paperId);
                if (!paper) return;
                const kpRaw = paper.keyPoints;
                const kpList = Array.isArray(kpRaw)
                    ? kpRaw.map(k => '  - ' + String(k).replace(/^-\s*/, '')).join('\n')
                    : String(kpRaw || '').split('\n').map(k => '  - ' + k.replace(/^-\s*/, '')).join('\n');
                const lines = [
                    '==============================================',
                    '  ResearchHub — Completed Paper Summary',
                    '==============================================',
                    '',
                    'Title      : ' + paper.title,
                    'Author     : ' + paper.author,
                    'Year       : ' + paper.year,
                    'Domain     : ' + (paper.domain || 'General'),
                    'Difficulty : ' + (paper.difficulty || 'N/A'),
                    'Read Time  : ' + (paper.timeToRead || 'N/A'),
                    'Completed  : ' + new Date().toLocaleString(),
                    '',
                    '----------------------------------------------',
                    'SHORT SUMMARY',
                    '----------------------------------------------',
                    paper.shortSummary || 'N/A',
                    '',
                    '----------------------------------------------',
                    'DETAILED SUMMARY',
                    '----------------------------------------------',
                    paper.detailedSummary || 'N/A',
                    '',
                    '----------------------------------------------',
                    'KEY POINTS',
                    '----------------------------------------------',
                    kpList || '  N/A',
                    '',
                    '==============================================',
                ];
                const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = paper.title.replace(/[^a-z0-9]/gi, '_') + '_summary.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(a.href);
                showToast('Paper summary downloaded!', false);
            }

            function toggleFavorite() {
                const papers = getPapers();
                const paper = papers.find(p => p.id === paperId);
                if (paper) {
                    const newFav = !paper.isFavorite;
                    updatePaperStatus(paperId, paper.status, formatProgress(paper.progress), newFav);
                    showToast(newFav ? 'Added to favorites!' : 'Removed from favorites', false);
                    setTimeout(() => {
                        loadPapersFromBackend().then(loadPaper);
                    }, 300);
                }
            }

            function showComingSoon() {
                showToast('This feature is coming soon!', false);
            }
        })();
    </script>
</body>

</html>
