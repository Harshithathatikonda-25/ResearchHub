<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ResearchHub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .login-wrapper {
      width: 100%;
      max-width: 450px;
      text-align: center;
    }

    .login-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 2.5rem;
      margin: 0 auto 1.5rem;
      box-shadow: var(--shadow-lg);
    }

    .login-wrapper h2 {
      margin-bottom: 0.5rem;
      font-size: 2rem;
      color: var(--text-primary);
    }

    .tagline {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .form-divider {
      text-align: center;
      color: var(--text-tertiary);
      margin: 1.5rem 0;
      position: relative;
    }

    .form-divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--bg-tertiary);
    }

    .form-divider span {
      background: white;
      padding: 0 1rem;
      position: relative;
    }
  </style>
</head>

<body>
  <div class="login-wrapper glass-container">
    <div class="login-icon">
      <i class="fas fa-book-open"></i>
    </div>
    <h2>ResearchHub</h2>
    <p class="tagline">Your Personal Research Paper Manager</p>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="user" class="form-control" placeholder="Enter your username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="pass" class="form-control" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="padding: 0.9rem; font-size: 1rem; margin-top: 1rem;">
        <i class="fas fa-sign-in-alt" style="margin-right: 0.5rem;"></i>Sign In
      </button>
    </form>

    <div class="form-divider">
      <span>Demo Credentials</span>
    </div>
    <p style="color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 1rem;">Use any username and password to log in</p>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const u = document.getElementById("user").value.trim();
      const p = document.getElementById("pass").value;
      
      if (u && p) {
        localStorage.setItem("loggedIn", "true");
        localStorage.setItem("currentUser", u);
        window.location.href = "index.html";
      } else {
        alert("Please enter a username and password.");
      }
    });
  </script>
</body>

</html>
